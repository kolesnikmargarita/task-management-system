spring:
  application:
    name: spring-security-tms
  datasource:
    url: jdbc:postgresql://${DB_HOST}/${DB_NAME}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  liquibase:
    change-log: src/main/resources/liquibase/changelog-master.xml
    enable: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expirationMs: 604800000 # 7 days
