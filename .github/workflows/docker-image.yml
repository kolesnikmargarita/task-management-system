name: Publishing Docker image to GitHub

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4


      - name: install java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: checking what we have
        run: ls

      - name: cleaning and assembling the project
        run: mvn clean package

      - name: Build the Docker image
        run: docker build -t margo010903/task-management-system .

      - name: Sending a Docker image to DockerHub
        run: docker push margo010903/task-management-system